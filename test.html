<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic RGB Gradient</title>
<style>
  #gradient-box {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, rgb(255, 0, 0) 0, rgb(0, 255, 255) 100%);
  }
</style>
</head>
<body>
<div id="gradient-box"></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  $(document).ready(function() {
    let red = 255;
    let green = 0;
    let blue = 0;
    
    setInterval(function() {
      red = (red + 1) % 256;
      green = (green + 2) % 256;
      blue = (blue + 3) % 256;
      
      $('#gradient-box').css('background', `linear-gradient(135deg, rgb(${red}, ${green}, ${blue}) 0, rgb(${255 - red}, ${255 - green}, ${255 - blue}) 100%)`);
    }, 100); // Change color every 100 milliseconds
  });
</script>
</body>
</html>
